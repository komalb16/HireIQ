<script>
// ═══════════════════════════════════════════════════════════════
// JOBAGENT PRO — DASHBOARD JAVASCRIPT
// ═══════════════════════════════════════════════════════════════

const API = () => document.getElementById('s-backend-url')?.value || 'http://localhost:3001';

// ── State ─────────────────────────────────────────────────────
let state = {
  userId: null,
  user: null,
  jobs: [],
  jobFilter: 'all',
  agentRunning: false,
  pollInterval: null,
  currentJob: null,
  currentJobTab: 'overview',
  solved: JSON.parse(localStorage.getItem('ib_solved') || '{}'),
  ibCategory: null,
  theme: localStorage.getItem('jap_theme') || 'cyber',
  mode: localStorage.getItem('jap_mode') || 'dark',
  roles: [],
  locations: [],
};

// ── Init ──────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  applyTheme();
  loadLocalUser();
  initInterviewBank();
  if (state.userId) {
    loadStats();
    loadJobs();
  }
});

// ── Theme ─────────────────────────────────────────────────────
function setTheme(t) {
  state.theme = t;
  localStorage.setItem('jap_theme', t);
  applyTheme();
  document.querySelectorAll('.theme-dot').forEach(d => d.classList.toggle('active', d.classList.contains(t)));
}

function setMode(m) {
  state.mode = m;
  localStorage.setItem('jap_mode', m);
  applyTheme();
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(m === 'medium' ? 'mid' : m)));
}

function applyTheme() {
  document.body.setAttribute('data-theme', state.theme);
  document.body.setAttribute('data-mode', state.mode);
}

// ── Navigation ────────────────────────────────────────────────
const pageTitles = {
  dashboard: ['Dashboard', 'AI-powered job search overview'],
  jobs: ['Job Queue', 'Review & apply to AI-matched jobs'],
  applied: ['Applied Jobs', 'Track your applications'],
  safeapply: ['Safe Apply', 'The right way to apply to jobs'],
  interview: ['Interview Bank', '91+ questions · 5 languages · 72 companies'],
  settings: ['Settings', 'Configure your account and preferences'],
  history: ['Run History', 'Previous agent runs'],
};

function showPage(page) {
  document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(`page-${page}`)?.classList.remove('hidden');

  const [title, sub] = pageTitles[page] || [page, ''];
  document.getElementById('topbar-title').textContent = title;
  document.getElementById('topbar-sub').textContent = sub;

  // Mark nav item active
  document.querySelectorAll('.nav-item').forEach(item => {
    if (item.getAttribute('onclick')?.includes(`'${page}'`)) item.classList.add('active');
  });

  if (page === 'jobs') loadJobs();
  if (page === 'applied') loadApplied();
  if (page === 'history') loadHistory();
  if (page === 'settings') populateSettings();
  if (page === 'dashboard') loadStats();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ── Toast ─────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toasts').prepend(el);
  setTimeout(() => el.remove(), 4000);
}

// ── User / Auth ───────────────────────────────────────────────
function loadLocalUser() {
  const stored = localStorage.getItem('jap_user');
  if (stored) {
    try {
      state.user = JSON.parse(stored);
      state.userId = state.user.id;
      state.roles = state.user.target_roles || [];
      state.locations = state.user.target_locations || [];
      document.getElementById('user-label').textContent = state.user.name;
    } catch {}
  }
}

async function saveProfile() {
  const name = document.getElementById('s-name').value.trim();
  const email = document.getElementById('s-email').value.trim();
  const whatsapp = document.getElementById('s-whatsapp').value.trim();

  if (!name || !email) { toast('Name and email are required', 'error'); return; }

  try {
    const method = state.userId ? 'PATCH' : 'POST';
    const url = state.userId ? `${API()}/api/users/${state.userId}` : `${API()}/api/users`;
    const body = state.userId ? { name, phone: whatsapp, whatsapp_number: whatsapp } : { name, email, phone: whatsapp };

    const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!res.ok) throw new Error(await res.text());
    const user = await res.json();
    state.user = user; state.userId = user.id;
    localStorage.setItem('jap_user', JSON.stringify(user));
    document.getElementById('user-label').textContent = user.name;
    toast('Profile saved!', 'success');
  } catch (err) {
    toast(`Save failed: ${err.message}`, 'error');
  }
}

async function saveKeys() {
  if (!state.userId) { toast('Save your profile first', 'error'); return; }
  const body = {
    GROQ_key: document.getElementById('s-GROQ').value.trim() || undefined,
    rapidapi_key: document.getElementById('s-rapidapi').value.trim() || undefined,
    twilio_sid: document.getElementById('s-twilio-sid').value.trim() || undefined,
    twilio_token: document.getElementById('s-twilio-token').value.trim() || undefined,
    twilio_from: document.getElementById('s-twilio-from').value.trim() || undefined,
  };
  // Remove empty
  Object.keys(body).forEach(k => { if (!body[k]) delete body[k]; });

  try {
    const res = await fetch(`${API()}/api/users/${state.userId}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!res.ok) throw new Error(await res.text());
    toast('API keys saved!', 'success');
  } catch (err) { toast(`Error: ${err.message}`, 'error'); }
}

async function savePreferences() {
  if (!state.userId) { toast('Save your profile first', 'error'); return; }
  const body = {
    target_roles: state.roles,
    target_locations: state.locations,
    min_score: parseInt(document.getElementById('s-minscore').value) || 65,
    apply_limit_daily: parseInt(document.getElementById('s-limit').value) || 10,
    notify_whatsapp: document.getElementById('toggle-notify').classList.contains('on') ? 1 : 0,
    auto_apply: document.getElementById('toggle-auto').classList.contains('on') ? 1 : 0,
  };

  try {
    const res = await fetch(`${API()}/api/users/${state.userId}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!res.ok) throw new Error(await res.text());
    toast('Preferences saved!', 'success');
  } catch (err) { toast(`Error: ${err.message}`, 'error'); }
}

async function saveResumeText() {
  if (!state.userId) { toast('Save your profile first', 'error'); return; }
  const text = document.getElementById('s-resume-text').value.trim();
  if (!text) { toast('No resume text entered', 'error'); return; }

  const blob = new Blob([text], { type: 'text/plain' });
  const fd = new FormData();
  fd.append('resume', blob, 'resume.txt');

  try {
    const res = await fetch(`${API()}/api/users/${state.userId}/resume`, { method: 'POST', body: fd });
    if (!res.ok) throw new Error(await res.text());
    document.getElementById('resume-status').textContent = `✅ Resume saved (${text.length} characters)`;
    toast('Resume saved!', 'success');
  } catch (err) { toast(`Error: ${err.message}`, 'error'); }
}

async function uploadResume(event) {
  if (!state.userId) { toast('Save your profile first', 'error'); return; }
  const file = event.target.files[0];
  if (!file) return;

  const fd = new FormData();
  fd.append('resume', file);

  try {
    const res = await fetch(`${API()}/api/users/${state.userId}/resume`, { method: 'POST', body: fd });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    document.getElementById('resume-status').textContent = `✅ ${file.name} uploaded (${data.chars} characters)`;
    toast('Resume uploaded!', 'success');
  } catch (err) { toast(`Upload error: ${err.message}`, 'error'); }
}

function dragOver(e) { e.preventDefault(); document.getElementById('resume-drop').classList.add('drag-over'); }
function dropResume(e) {
  e.preventDefault();
  document.getElementById('resume-drop').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) uploadResume({ target: { files: [file] } });
}

// ── Settings Population ───────────────────────────────────────
function populateSettings() {
  if (!state.user) return;
  document.getElementById('s-name').value = state.user.name || '';
  document.getElementById('s-email').value = state.user.email || '';
  document.getElementById('s-whatsapp').value = state.user.whatsapp_number || '';
  document.getElementById('s-minscore').value = state.user.min_score || 65;
  document.getElementById('s-limit').value = state.user.apply_limit_daily || 10;
  if (state.user.notify_whatsapp) document.getElementById('toggle-notify').classList.add('on');
  if (state.user.auto_apply) document.getElementById('toggle-auto').classList.add('on');
  renderRoleTags();
  renderLocationTags();
}

// ── Tag Input ─────────────────────────────────────────────────
function addTag(type, event) {
  if (event.key !== 'Enter') return;
  const inputId = type === 'roles' ? 'role-input' : 'location-input';
  const val = document.getElementById(inputId).value.trim();
  if (!val) return;
  if (type === 'roles' && !state.roles.includes(val)) { state.roles.push(val); renderRoleTags(); }
  if (type === 'locations' && !state.locations.includes(val)) { state.locations.push(val); renderLocationTags(); }
  document.getElementById(inputId).value = '';
}

function renderRoleTags() {
  const wrap = document.getElementById('roles-wrap');
  wrap.querySelectorAll('.tag').forEach(t => t.remove());
  state.roles.forEach(r => {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.innerHTML = `${r} <span class="tag-remove" onclick="removeTag('roles','${r}')">×</span>`;
    wrap.insertBefore(tag, document.getElementById('role-input'));
  });
}

function renderLocationTags() {
  const wrap = document.getElementById('locations-wrap');
  wrap.querySelectorAll('.tag').forEach(t => t.remove());
  state.locations.forEach(l => {
    const tag = document.createElement('span');
    tag.className = 'tag';
    tag.innerHTML = `${l} <span class="tag-remove" onclick="removeTag('locations','${l}')">×</span>`;
    wrap.insertBefore(tag, document.getElementById('location-input'));
  });
}

function removeTag(type, val) {
  if (type === 'roles') state.roles = state.roles.filter(r => r !== val);
  else state.locations = state.locations.filter(l => l !== val);
  renderRoleTags(); renderLocationTags();
}

function toggleEl(id) {
  document.getElementById(id).classList.toggle('on');
}

// ── Connection Test ───────────────────────────────────────────
async function testConnection() {
  const el = document.getElementById('conn-status');
  el.textContent = 'Testing…';
  try {
    const res = await fetch(`${API()}/health`);
    const data = await res.json();
    el.textContent = '✅ Connected — ' + data.version;
    el.style.color = 'var(--green)';
    toast('Backend connected!', 'success');
  } catch (err) {
    el.textContent = '❌ Not reachable — is the backend running?';
    el.style.color = 'var(--red)';
  }
}

// ── Agent Run ─────────────────────────────────────────────────
async function runAgent() {
  if (!state.userId) {
    toast('Please create your profile in Settings first', 'error');
    showPage('settings');
    return;
  }
  if (state.agentRunning) { toast('Agent is already running', 'info'); return; }

  try {
    const res = await fetch(`${API()}/api/agent/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: state.userId }),
    });
    if (!res.ok) throw new Error(await res.text());

    state.agentRunning = true;
    document.getElementById('run-btn').disabled = true;
    document.getElementById('run-btn').textContent = '⏳ Running…';

    showPage('dashboard');
    document.getElementById('agent-viz-idle').classList.add('hidden');
    document.getElementById('agent-viz-running').classList.remove('hidden');
    document.getElementById('sidebar-dot').classList.add('running');

    startPolling();
    toast('Agent started! Discovering jobs…', 'success');
  } catch (err) {
    toast(`Failed to start: ${err.message}`, 'error');
  }
}

function startPolling() {
  clearInterval(state.pollInterval);
  state.pollInterval = setInterval(pollStatus, 2500);
}

async function pollStatus() {
  if (!state.userId) return;
  try {
    const res = await fetch(`${API()}/api/agent/status/${state.userId}`);
    const s = await res.json();

    if (s.status === 'idle') return;

    // Update sidebar
    document.getElementById('sidebar-phase').textContent = s.phase || s.status;
    const prog = s.phase?.includes('Scor') ? 33 : s.phase?.includes('Tailor') ? 66 : s.phase?.includes('Notif') ? 88 : s.status === 'completed' ? 100 : 15;
    document.getElementById('sidebar-progress').style.width = prog + '%';

    // Update viz
    document.getElementById('viz-phase').textContent = s.phase || s.status;
    document.getElementById('viz-stats').textContent = `Found ${s.jobsFound || 0} · Scored ${s.jobsScored || 0} · Ready ${s.jobsQueued || 0}`;

    // Append new logs
    if (s.logs?.length) {
      const logEl = document.getElementById('agent-log');
      const lines = s.logs.slice(-15);
      logEl.innerHTML = lines.map((l, i) => `<div class="log-line ${i === lines.length - 1 ? 'new' : ''}">${l}</div>`).join('');
      logEl.scrollTop = logEl.scrollHeight;
    }

    if (s.status === 'completed' || s.status === 'failed') {
      clearInterval(state.pollInterval);
      state.agentRunning = false;
      document.getElementById('run-btn').disabled = false;
      document.getElementById('run-btn').innerHTML = '<span>▶</span> Run Agent';
      document.getElementById('sidebar-dot').classList.remove('running');

      if (s.status === 'completed') {
        toast(`Done! Found ${s.jobsFound || 0} jobs, ${s.jobsQueued || 0} ready to apply`, 'success');
        loadStats();
        loadJobs();
        document.getElementById('agent-viz-idle').classList.remove('hidden');
        document.getElementById('agent-viz-running').classList.add('hidden');
      } else {
        toast('Agent run failed — check logs', 'error');
      }
    }
  } catch { /* backend may be starting */ }
}

// ── Stats ─────────────────────────────────────────────────────
async function loadStats() {
  if (!state.userId) return;
  try {
    const res = await fetch(`${API()}/api/stats/${state.userId}`);
    const d = await res.json();

    document.getElementById('stat-total').textContent = d.total || 0;
    document.getElementById('stat-applied').textContent = d.byStatus?.find(s => s.status === 'applied')?.n || 0;
    document.getElementById('stat-ready').textContent = d.byStatus?.find(s => s.status === 'ready')?.n || 0;
    document.getElementById('stat-score').textContent = d.avgScore ? d.avgScore + '%' : '—';

    const readyCount = d.byStatus?.find(s => s.status === 'ready')?.n || 0;
    const appliedCount = d.byStatus?.find(s => s.status === 'applied')?.n || 0;
    document.getElementById('nav-ready-count').textContent = readyCount;
    document.getElementById('nav-applied-count').textContent = appliedCount;

    // Top jobs
    if (d.topJobs?.length) {
      document.getElementById('top-jobs-list').innerHTML = d.topJobs.map(j => `
        <div style="padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="openJobLink('${j.job_url}')">
          <div class="flex items-center gap-2">
            <span class="score-badge ${j.match_score >= 80 ? 'high' : j.match_score >= 65 ? 'mid' : 'low'}" style="width:38px;height:38px;font-size:12px">${j.match_score}%</span>
            <div>
              <div style="font-size:13px;font-weight:700;color:var(--text)">${j.title}</div>
              <div style="font-size:11px;color:var(--accent)">${j.company}</div>
            </div>
            <span class="status-pill status-${j.status} ml-auto">${j.status}</span>
          </div>
        </div>
      `).join('');
    }
  } catch { /* backend offline */ }
}

// ── Jobs ──────────────────────────────────────────────────────
let allJobsData = [];

async function loadJobs() {
  if (!state.userId) return;
  try {
    const filter = state.jobFilter !== 'all' ? `&status=${state.jobFilter}` : '';
    const res = await fetch(`${API()}/api/jobs/${state.userId}?limit=100${filter}`);
    const d = await res.json();
    allJobsData = d.jobs || [];
    renderJobs(allJobsData);
  } catch { document.getElementById('jobs-grid').innerHTML = '<p class="text-muted text-sm">⚠️ Could not connect to backend</p>'; }
}

function renderJobs(jobs) {
  const grid = document.getElementById('jobs-grid');
  if (!jobs.length) { grid.innerHTML = '<p class="text-muted text-sm">No jobs found — run the agent first.</p>'; return; }

  grid.innerHTML = jobs.map(j => {
    const sc = j.match_score;
    const cls = sc >= 80 ? 'high' : sc >= 65 ? 'mid' : 'low';
    return `<div class="job-card" onclick="openJobModal('${j.id}')">
      <div>
        <div class="job-title">${j.title}</div>
        <div class="job-company">${j.company}</div>
        <div class="job-meta">
          <span class="job-meta-item">📍 ${j.location || '—'}</span>
          ${j.salary ? `<span class="job-meta-item">💰 ${j.salary}</span>` : ''}
          <span class="job-meta-item">🔗 ${j.source}</span>
          <span class="status-pill status-${j.status}">${j.status}</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        ${sc ? `<div class="score-badge ${cls}">${sc}%</div>` : '<div class="score-badge low">?</div>'}
        ${j.tailored_resume ? '<span class="text-xs text-green">✅ Resume</span>' : ''}
        ${j.cover_letter ? '<span class="text-xs text-accent">✅ Cover</span>' : ''}
      </div>
    </div>`;
  }).join('');
}

function filterJobs() {
  const q = document.getElementById('job-search').value.toLowerCase();
  const filtered = allJobsData.filter(j =>
    !q || j.title.toLowerCase().includes(q) || j.company.toLowerCase().includes(q)
  );
  renderJobs(filtered);
}

function setJobFilter(filter, btn) {
  state.jobFilter = filter;
  document.querySelectorAll('#job-filters .filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadJobs();
}

async function loadApplied() {
  if (!state.userId) return;
  try {
    const res = await fetch(`${API()}/api/jobs/${state.userId}?status=applied&limit=50`);
    const d = await res.json();
    const grid = document.getElementById('applied-grid');
    if (!d.jobs?.length) { grid.innerHTML = '<p class="text-muted text-sm">No applied jobs yet.</p>'; return; }
    grid.innerHTML = d.jobs.map(j => `
      <div class="job-card">
        <div>
          <div class="job-title">${j.title}</div>
          <div class="job-company">${j.company}</div>
          <div class="job-meta">
            <span class="job-meta-item">📍 ${j.location || '—'}</span>
            <span class="job-meta-item">📅 Applied: ${j.applied_at ? new Date(j.applied_at).toLocaleDateString() : '—'}</span>
          </div>
        </div>
        <div class="score-badge ${j.match_score >= 80 ? 'high' : 'mid'}">${j.match_score || '?'}%</div>
      </div>`).join('');
  } catch {}
}

// ── Job Modal ─────────────────────────────────────────────────
let modalJob = null;

async function openJobModal(jobId) {
  const job = allJobsData.find(j => j.id === jobId);
  if (!job) return;
  modalJob = job;

  document.getElementById('jm-title').textContent = job.title;
  document.getElementById('jm-company').textContent = `${job.company} · ${job.location || '—'}`;
  jmTab('overview', null);
  document.getElementById('job-modal').classList.remove('hidden');
}

function jmTab(tab, btn) {
  state.currentJobTab = tab;
  document.querySelectorAll('.modal .tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else document.querySelectorAll('.modal .tab')[0]?.classList.add('active');

  const j = modalJob;
  const body = document.getElementById('jm-body');

  if (tab === 'overview') {
    const sc = j.match_score;
    const reasons = tryParseArr(j.match_reasons);
    const gaps = tryParseArr(j.match_gaps);
    body.innerHTML = `
      <div class="flex gap-3 mb-4">
        <div class="score-badge ${sc >= 80 ? 'high' : sc >= 65 ? 'mid' : 'low'}" style="width:60px;height:60px;font-size:20px">${sc || '?'}%</div>
        <div>
          <div class="font-display fw-700" style="font-size:16px">${j.title}</div>
          <div style="color:var(--accent)">${j.company}</div>
          <div class="text-muted text-xs">${j.location} · ${j.source}</div>
        </div>
      </div>
      ${j.salary ? `<div class="text-sm mb-4"><span class="text-muted">Salary:</span> <strong>${j.salary}</strong></div>` : ''}
      ${reasons.length ? `<div class="mb-4"><div class="q-section-title">✅ Why you match</div>${reasons.map(r => `<div class="text-sm" style="padding:3px 0">• ${r}</div>`).join('')}</div>` : ''}
      ${gaps.length ? `<div class="mb-4"><div class="q-section-title" style="color:var(--amber)">⚠️ Gaps to address</div>${gaps.map(g => `<div class="text-sm" style="padding:3px 0">• ${g}</div>`).join('')}</div>` : ''}
      <div class="status-pill status-${j.status}" style="display:inline-flex">${j.status}</div>
    `;
  } else if (tab === 'resume') {
    body.innerHTML = j.tailored_resume
      ? `<div class="code-block" style="white-space:pre-wrap;font-size:12px;color:var(--text2)">${escHtml(j.tailored_resume)}</div>`
      : '<p class="text-muted text-sm">Resume not tailored yet — run the agent with your resume uploaded.</p>';
  } else if (tab === 'cover') {
    body.innerHTML = j.cover_letter
      ? `<div class="code-block" style="white-space:pre-wrap;font-size:12px;color:var(--text2)">${escHtml(j.cover_letter)}</div>`
      : '<p class="text-muted text-sm">Cover letter not generated yet.</p>';
  } else if (tab === 'description') {
    body.innerHTML = j.description
      ? `<div style="font-size:12px;line-height:1.7;color:var(--text2);white-space:pre-wrap">${escHtml(j.description.slice(0, 3000))}${j.description.length > 3000 ? '\n\n[Truncated…]' : ''}</div>`
      : '<p class="text-muted text-sm">No description available.</p>';
  }
}

function closeJobModal(e) {
  if (!e || e.target.id === 'job-modal') document.getElementById('job-modal').classList.add('hidden');
}

function openJobLink() {
  if (modalJob?.job_url) window.open(modalJob.job_url, '_blank');
}

function copyContent() {
  const text = state.currentJobTab === 'resume' ? modalJob?.tailored_resume : modalJob?.cover_letter;
  if (text) { navigator.clipboard.writeText(text); toast('Copied to clipboard!', 'success'); }
}

async function markApplied() {
  if (!modalJob) return;
  try {
    await fetch(`${API()}/api/jobs/${modalJob.id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'applied' }),
    });
    modalJob.status = 'applied';
    jmTab('overview', null);
    loadStats();
    toast('Marked as applied! 🎉', 'success');
  } catch (err) { toast('Error: ' + err.message, 'error'); }
}

// ── History ───────────────────────────────────────────────────
async function loadHistory() {
  if (!state.userId) return;
  try {
    const res = await fetch(`${API()}/api/agent/history/${state.userId}`);
    const runs = await res.json();

function initInterviewBank() {
  updateSolvedProgress();
}

function ibNav() {
  const nav = document.getElementById('ib-nav');
  nav.innerHTML = '';

  IB.categories.forEach(cat => {
    const header = document.createElement('div');
    header.className = 'ib-section-header';
    header.textContent = cat.label;
    nav.appendChild(header);

    const items = IB[cat.id] || [];
    const companies = [...new Set(items.flatMap(q => q.companies || []))];

    // Show companies as sub-filters
    const allBtn = document.createElement('div');
    allBtn.className = `ib-cat ${state.ibCategory === cat.id + '_all' ? 'active' : ''}`;
    allBtn.innerHTML = `<span>All ${cat.label.split(' ').slice(1).join(' ')}</span><span class="ib-cat-count">${items.length}</span>`;
    allBtn.onclick = () => { state.ibCategory = cat.id + '_all'; ibNav(); renderIBQuestions(cat.id, null); };
    nav.appendChild(allBtn);

    // Top companies
    companies.slice(0, 5).forEach(co => {
      const btn = document.createElement('div');
      btn.className = `ib-cat ${state.ibCategory === cat.id + '_' + co ? 'active' : ''}`;
      const count = items.filter(q => q.companies?.includes(co)).length;
      btn.innerHTML = `<span style="padding-left:8px">⤷ ${co}</span><span class="ib-cat-count">${count}</span>`;
      btn.onclick = () => { state.ibCategory = cat.id + '_' + co; ibNav(); renderIBQuestions(cat.id, co); };
      nav.appendChild(btn);
    });
  });
}

function renderIBQuestions(catId, companyFilter) {
  let questions = (IB[catId] || []);
  if (companyFilter) questions = questions.filter(q => q.companies?.includes(companyFilter));

  // Apply search/diff filter
  const q = document.getElementById('ib-search')?.value.toLowerCase() || '';
  const diff = document.getElementById('ib-diff-filter')?.value || '';
  if (q) questions = questions.filter(q2 => q2.title.toLowerCase().includes(q) || q2.problem.toLowerCase().includes(q));
  if (diff) questions = questions.filter(q2 => q2.diff === diff);

  const main = document.getElementById('ib-main');
  if (!questions.length) { main.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text3)">No questions found</div>'; return; }

  main.innerHTML = questions.map((q, i) => {
    const solved = state.solved[q.id];
    return `<div class="q-card ${solved ? 'solved' : ''}" id="qcard-${q.id}">
      <div class="q-header" onclick="toggleQ('${q.id}')">
        <span class="q-num">#${i+1}</span>
        <span class="q-title">${q.title}</span>
      </div>
      <div class="q-meta">
        <span class="diff-badge diff-${q.diff.toLowerCase()}">${q.diff}</span>
        ${q.blind75 ? '<span class="company-tag" style="background:rgba(0,212,255,0.1);color:var(--accent)">Blind 75</span>' : ''}
        ${(q.companies || []).slice(0,4).map(c => `<span class="company-tag">${c}</span>`).join('')}
        ${solved ? '<span class="company-tag" style="background:rgba(0,255,136,0.1);color:var(--green)">✅ Solved</span>' : ''}
      </div>
      <div id="qbody-${q.id}" class="q-body hidden">
        ${renderQBody(q, catId)}
      </div>
    </div>`;
  }).join('');
}

function renderQBody(q, catId) {
  const solved = state.solved[q.id];
  let html = `<div class="flex items-center gap-2 mb-4">
    <button class="solve-btn ${solved ? 'solved' : ''}" onclick="toggleSolved('${q.id}',event)">
      ${solved ? '✅ Solved' : '○ Mark Solved'}
    </button>
    ${q.complexity ? `<span class="text-xs text-muted">${q.complexity}</span>` : ''}
  </div>`;

  html += `<div class="q-section-title">Problem</div>
  <p style="font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px">${q.problem}</p>`;

  if (q.hints) {
    html += `<div class="q-section-title">Hints</div>
    <div class="hint-box">${q.hints}</div>`;
  }

  if (q.approach) {
    html += `<div class="q-section-title">Approach</div>
    <div class="code-block" style="white-space:pre-wrap;color:var(--text2)">${q.approach}</div>`;
  }

  if (q.arch) {
    html += `<div class="q-section-title">Architecture</div>
    <div class="code-block" style="white-space:pre">${q.arch}</div>`;
  }

  if (q.solutions) {
    const langs = Object.keys(q.solutions);
    const firstLang = langs[0];
    html += `<div class="q-section-title">Solutions</div>
    <div class="lang-tabs" id="ltabs-${q.id}">
      ${langs.map((l,i) => `<button class="lang-tab ${i===0?'active':''}" onclick="showLang('${q.id}','${l}',this)">${l.charAt(0).toUpperCase()+l.slice(1)}</button>`).join('')}
    </div>
    ${langs.map((l,i) => `<div class="code-block" id="lcode-${q.id}-${l}" ${i>0?'style="display:none"':''}>${escHtml(q.solutions[l])}</div>`).join('')}`;
  }

  if (q.framework) {
    html += `<div class="q-section-title">Framework & Structure</div>
    <div class="code-block" style="white-space:pre-wrap;color:var(--text2)">${q.framework}</div>`;
  }

  if (q.example) {
    html += `<div class="q-section-title">Example Answer</div>
    <div class="hint-box" style="border-left-color:var(--green)">${q.example}</div>`;
  }

  if (q.star) {
    html += `<div class="q-section-title">STAR Template</div>
    <div class="star-template">
      ${['Situation','Task','Action','Result'].map(s => `<div class="star-label">${s}</div><p style="font-size:12px;color:var(--text2);margin-bottom:10px">Write your ${s.toLowerCase()} here...</p>`).join('')}
    </div>`;
  }

  if (q.redflags) {
    html += `<div class="q-section-title" style="color:var(--red)">🚩 Red Flags to Avoid</div>
    <div class="hint-box" style="border-left-color:var(--red)">
      ${q.redflags.map(r => `• ${r}`).join('<br>')}
    </div>`;
  }

  if (q.followups?.length) {
    html += `<div class="q-section-title">Follow-up Questions</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${q.followups.map(f => `<span class="company-tag" style="font-size:11px;padding:4px 8px">${f}</span>`).join('')}
    </div>`;
  }

  return html;
}

function toggleQ(id) {
  const body = document.getElementById(`qbody-${id}`);
  body.classList.toggle('hidden');
  document.getElementById(`qcard-${id}`)?.classList.toggle('open');
}

function showLang(qId, lang, btn) {
  const tabs = document.getElementById(`ltabs-${qId}`);
  tabs?.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  // Hide all lang blocks
  ['python','java','cpp','javascript','go'].forEach(l => {
    const el = document.getElementById(`lcode-${qId}-${l}`);
    if (el) el.style.display = l === lang ? '' : 'none';
  });
}

function toggleSolved(id, event) {
  event.stopPropagation();
  state.solved[id] = !state.solved[id];
  localStorage.setItem('ib_solved', JSON.stringify(state.solved));
  updateSolvedProgress();
  const btn = document.querySelector(`#qcard-${id} .solve-btn`);
  if (btn) { btn.classList.toggle('solved'); btn.textContent = state.solved[id] ? '✅ Solved' : '○ Mark Solved'; }
}

function clearSolved() {
  state.solved = {}; localStorage.setItem('ib_solved', '{}');
  updateSolvedProgress();
  document.querySelectorAll('.solve-btn.solved').forEach(b => { b.classList.remove('solved'); b.textContent = '○ Mark Solved'; });
}

function updateSolvedProgress() {
  const total = IB.dsa.length + IB.design.length + IB.behavioral.length + IB.sre.length;
  const solved = Object.values(state.solved).filter(Boolean).length;
  const pct = total ? Math.round((solved / total) * 100) : 0;
  const circ = 113 - (113 * pct / 100);
  const ring = document.getElementById('progress-ring-fill');
  if (ring) ring.style.strokeDashoffset = circ;
  const pctEl = document.getElementById('progress-pct');
  if (pctEl) pctEl.textContent = pct + '%';
  const countEl = document.getElementById('solved-count');
  if (countEl) countEl.textContent = `${solved} / ${total}`;
}

function ibFilter() {
  const active = state.ibCategory;
  if (!active) return;
  const [catId, filter] = active.split('_');
  const co = filter === 'all' ? null : filter;
  renderIBQuestions(catId, co);
}

// Initialize IB nav after DOM ready
document.addEventListener('DOMContentLoaded', () => {
  ibNav();
});

// ── Utility Functions ─────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function tryParseArr(s) {
  try { return JSON.parse(s) || []; } catch { return []; }
}

// Check if user was previously logged in and reload stats
window.addEventListener('load', () => {
  applyTheme();
  if (state.userId) {
    loadStats();
    // Resume polling if agent was running
    pollStatus();
  }
});

</script>
</body>
</html>
