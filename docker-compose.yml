version: '3.8'

services:
  backend:
    build: .
    container_name: jobagent-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    volumes:
      - jobagent-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  jobagent-data:
    driver: local
